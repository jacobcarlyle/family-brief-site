  <style>
    :root { --ink: #0F172A; --muted: #64748B; --bg: #F8FAFC; --card: #FFFFFF; }
    *,*::before,*::after { box-sizing: border-box; }
    html,body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
    .card { background: var(--card); border-radius: 12px; padding: 20px;
            margin-top: 16px; box-shadow: 0 1px 2px rgba(15,23,42,0.05); }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 16px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; align-items: center; padding: 12px 0;
         border-bottom: 1px solid #E2E8F0; }
    li:last-child { border-bottom: 0; }
    .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px;
           flex-shrink: 0; }
    .name { flex: 1; font-weight: 600; }
    .links { display: flex; gap: 8px; }
    .links a { font-size: 14px; text-decoration: none; padding: 6px 10px;
               border-radius: 6px; color: var(--ink);
               border: 1px solid #E2E8F0; }
    footer { color: var(--muted); font-size: 12px; text-align: center;
             padding: 24px 8px; }
  </style>
</head>
